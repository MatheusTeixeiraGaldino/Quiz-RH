<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>QuizLive — Quiz em Tempo Real</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root{
  --bg:#07070f;
  --surface:#0f0f1a;
  --surface2:#171727;
  --surface3:#1e1e30;
  --border:#252538;
  --border2:#303048;
  --accent:#6c5ce7;
  --accent-glow:rgba(108,92,231,.35);
  --accent2:#fd79a8;
  --accent3:#00cec9;
  --accent4:#fdcb6e;
  --text:#eeeeff;
  --text2:#b8b8d0;
  --muted:#686882;
  --green:#00b894;
  --green-bg:#001a14;
  --red:#e17055;
  --red-bg:#1a0a06;
  --yellow:#fdcb6e;
  --yellow-bg:#1a1400;
  --r:16px;
  --r-sm:10px;
  --r-xs:6px;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --shadow-sm:0 4px 16px rgba(0,0,0,.4);
  --shadow-glow:0 0 40px var(--accent-glow);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.5;
}

/* noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4;
}

h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.15}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center}
.screen{
  width:100%;max-width:500px;
  padding:20px 18px 32px;
  display:flex;flex-direction:column;gap:14px;
  animation:fadeUp .35s cubic-bezier(.22,1,.36,1);
}
.screen.wide{max-width:720px}
.screen.full{max-width:100%;padding:0}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounceIn{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.15)}
  80%{transform:scale(.95)}
  100%{transform:scale(1);opacity:1}
}
@keyframes shimmer{
  0%{background-position:-200% 0}
  100%{background-position:200% 0}
}
@keyframes glow{
  0%,100%{box-shadow:0 0 20px var(--accent-glow)}
  50%{box-shadow:0 0 40px var(--accent-glow),0 0 60px rgba(108,92,231,.2)}
}

/* ═══════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════ */
.top-bar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(7,7,15,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  width:100%;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:21px;
  letter-spacing:-1px;
  background:linear-gradient(135deg,#a29bfe,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ═══════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  color:var(--text2);letter-spacing:.3px;
  text-transform:uppercase;margin-bottom:14px;
}
.card-glow{box-shadow:var(--shadow-glow);border-color:rgba(108,92,231,.4)}

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border-radius:var(--r-sm);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;border:none;transition:all .18s cubic-bezier(.22,1,.36,1);
  text-decoration:none;width:100%;position:relative;overflow:hidden;
  letter-spacing:.1px;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.06),transparent);
  pointer-events:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#8e7cf5);
  color:#fff;font-weight:600;
  box-shadow:0 4px 20px rgba(108,92,231,.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,92,231,.55)}
.btn-primary:active{transform:translateY(0)}

.btn-secondary{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border2);
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--surface3)}

.btn-danger{background:rgba(225,112,85,.12);color:var(--red);border:1px solid rgba(225,112,85,.25)}
.btn-danger:hover{background:rgba(225,112,85,.2)}

.btn-success{background:rgba(0,184,148,.12);color:var(--green);border:1px solid rgba(0,184,148,.3)}
.btn-success:hover{background:rgba(0,184,148,.2)}

.btn-ghost{background:transparent;color:var(--muted);width:auto;padding:8px 12px}
.btn-ghost:hover{color:var(--text)}

.btn-sm{padding:8px 16px;font-size:13px;width:auto;border-radius:var(--r-xs)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--r-xs);flex-shrink:0}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ═══════════════════════════════════════════════
   INPUTS
═══════════════════════════════════════════════ */
.input-wrap{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase}
input,textarea,select{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r-sm);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  padding:11px 14px;width:100%;transition:all .18s;outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--accent);
  background:var(--surface3);
  box-shadow:0 0 0 3px rgba(108,92,231,.15);
}
textarea{resize:vertical;min-height:72px}
select option{background:var(--surface2)}
input::placeholder,textarea::placeholder{color:var(--muted)}

/* ═══════════════════════════════════════════════
   BADGES
═══════════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:99px;
  font-size:12px;font-weight:600;letter-spacing:.2px;
}
.badge-purple{background:rgba(108,92,231,.15);color:#a29bfe;border:1px solid rgba(108,92,231,.25)}
.badge-green{background:rgba(0,184,148,.1);color:#00cec9;border:1px solid rgba(0,184,148,.2)}
.badge-red{background:rgba(225,112,85,.1);color:#e17055;border:1px solid rgba(225,112,85,.2)}
.badge-yellow{background:rgba(253,203,110,.1);color:#fdcb6e;border:1px solid rgba(253,203,110,.2)}
.badge-pink{background:rgba(253,121,168,.1);color:#fd79a8;border:1px solid rgba(253,121,168,.2)}
.badge-live{animation:glow 2s infinite}

/* ═══════════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════════ */
.divider{height:1px;background:var(--border);margin:2px 0}
.divider-text{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px}
.divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════════════════════════
   AVATAR PICKER
═══════════════════════════════════════════════ */
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.avatar-opt{
  aspect-ratio:1;border-radius:50%;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:var(--surface2);
  border:2px solid var(--border2);
  transition:all .2s cubic-bezier(.22,1,.36,1);
  user-select:none;
}
.avatar-opt:hover{border-color:var(--accent);transform:scale(1.1);background:var(--surface3)}
.avatar-opt.selected{
  border-color:var(--accent);
  background:rgba(108,92,231,.2);
  transform:scale(1.12);
  box-shadow:0 0 0 4px rgba(108,92,231,.2);
}

/* ═══════════════════════════════════════════════
   QUIZ QUESTION UI
═══════════════════════════════════════════════ */
.question-text{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:700;
  line-height:1.3;margin-bottom:20px;
}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{
  padding:15px 14px;border-radius:var(--r);
  font-size:14px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border2);
  background:var(--surface2);color:var(--text);
  transition:all .2s cubic-bezier(.22,1,.36,1);
  text-align:left;line-height:1.35;
  position:relative;overflow:hidden;
}
.opt-btn .opt-label{
  display:inline-block;width:24px;height:24px;
  border-radius:50%;background:var(--surface3);
  font-size:11px;font-weight:700;text-align:center;line-height:24px;
  margin-bottom:6px;color:var(--muted);
}
.opt-btn:hover:not(:disabled){
  border-color:var(--accent);
  background:var(--surface3);
  transform:translateY(-2px);
  box-shadow:var(--shadow-sm);
}
.opt-btn:active:not(:disabled){transform:translateY(0)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{
  background:rgba(0,184,148,.12)!important;
  border-color:var(--green)!important;
  color:var(--green)!important;
}
.opt-btn.correct .opt-label{background:rgba(0,184,148,.2);color:var(--green)}
.opt-btn.wrong{
  background:rgba(225,112,85,.1)!important;
  border-color:var(--red)!important;
  color:var(--red)!important;
}
.opt-btn.wrong .opt-label{background:rgba(225,112,85,.15);color:var(--red)}
.opt-btn.selected-neutral{border-color:var(--accent);background:rgba(108,92,231,.1)}
.opt-btn.pending{
  background:linear-gradient(90deg,var(--surface2) 0%,var(--surface3) 50%,var(--surface2) 100%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-color:var(--accent);
}

/* ═══════════════════════════════════════════════
   RANKING
═══════════════════════════════════════════════ */
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);
  transition:all .25s;
  animation:slideRight .3s ease both;
}
.rank-item:nth-child(1){animation-delay:.05s}
.rank-item:nth-child(2){animation-delay:.1s}
.rank-item:nth-child(3){animation-delay:.15s}
.rank-item:nth-child(n+4){animation-delay:.2s}
.rank-item.top1{border-color:rgba(253,203,110,.4);background:rgba(253,203,110,.04)}
.rank-item.top2{border-color:rgba(148,163,184,.3);background:rgba(148,163,184,.04)}
.rank-item.top3{border-color:rgba(205,124,50,.3);background:rgba(205,124,50,.04)}
.rank-num{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;min-width:32px;text-align:center}
.rank-avatar{font-size:28px;line-height:1}
.rank-name{font-weight:500;flex:1;font-size:15px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rank-score{
  font-family:'Syne',sans-serif;font-weight:700;font-size:17px;
  color:var(--accent);white-space:nowrap;
}
.rank-delta{font-size:12px;color:var(--green);margin-top:1px}
.rank-me{border-color:var(--accent)!important;background:rgba(108,92,231,.08)!important}

/* ═══════════════════════════════════════════════
   PODIUM
═══════════════════════════════════════════════ */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:24px 0 0}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.podium-emoji{font-size:38px;line-height:1;animation:bounceIn .6s ease both}
.podium-emoji.first{font-size:52px;animation-delay:.1s}
.podium-name{font-size:13px;font-weight:600;text-align:center;max-width:100px;word-break:break-word;line-height:1.3}
.podium-score{font-size:12px;color:var(--muted);margin-top:2px}
.podium-block{
  border-radius:var(--r-sm) var(--r-sm) 0 0;width:88px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:26px;
  animation:scaleIn .5s ease both;
}
.podium-block.p1{
  background:linear-gradient(180deg,#fdcb6e,#e6b800);
  height:100px;color:#1a1000;
  animation-delay:.2s;
  box-shadow:0 -4px 24px rgba(253,203,110,.3);
}
.podium-block.p2{
  background:linear-gradient(180deg,#b2bec3,#7f8c8d);
  height:72px;color:#0a0e1a;
  animation-delay:.3s;
}
.podium-block.p3{
  background:linear-gradient(180deg,#cd7c32,#8d4e0e);
  height:54px;color:#1a0800;
  animation-delay:.4s;
}

/* ═══════════════════════════════════════════════
   PROGRESS / TIMER
═══════════════════════════════════════════════ */
.q-progress{display:flex;gap:4px;margin:8px 0 16px}
.q-dot{flex:1;height:4px;border-radius:99px;background:var(--border2);transition:all .3s}
.q-dot.done{background:var(--accent);opacity:.6}
.q-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}

.timer-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:16px}
.timer-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width 1s linear;
}

/* ═══════════════════════════════════════════════
   STATS GRID
═══════════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:16px;text-align:center;
}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;color:var(--accent)}
.stat-label{font-size:12px;color:var(--muted);margin-top:3px;font-weight:500}

/* ═══════════════════════════════════════════════
   QR CODE
═══════════════════════════════════════════════ */
.qr-wrap{
  background:#fff;border-radius:var(--r);
  padding:14px;display:inline-block;
  margin:0 auto;box-shadow:0 0 0 8px rgba(255,255,255,.06);
}
#qr-canvas{display:block}

/* ═══════════════════════════════════════════════
   ANSWER COUNT
═══════════════════════════════════════════════ */
.answer-count{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--surface2);
  border-radius:var(--r-sm);border:1px solid var(--border);
}
.answer-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.answer-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease}

/* ═══════════════════════════════════════════════
   QUESTION BUILDER
═══════════════════════════════════════════════ */
.q-builder{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);padding:18px;
  display:flex;flex-direction:column;gap:12px;
}
.q-builder-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  color:var(--accent);display:flex;align-items:center;gap:6px;
}
.q-list-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);
  animation:fadeIn .3s ease;
}
.q-list-num{
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  color:var(--accent);min-width:22px;line-height:1.6;
}
.q-list-text{flex:1;font-size:14px;line-height:1.4;color:var(--text)}
.q-list-meta{font-size:12px;color:var(--muted);margin-top:3px}
.option-row{display:flex;gap:8px;align-items:center}
.option-row input{flex:1}
.correct-radio{
  width:20px;height:20px;flex-shrink:0;
  accent-color:var(--green);cursor:pointer;
}

/* ═══════════════════════════════════════════════
   PLAYERS CHIPS
═══════════════════════════════════════════════ */
.player-chips{display:flex;flex-wrap:wrap;gap:8px}
.player-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:99px;font-size:13px;
  animation:scaleIn .25s ease;
}

/* ═══════════════════════════════════════════════
   WAIT SCREEN
═══════════════════════════════════════════════ */
.wait-orb{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a29bfe,var(--accent),#4a3aab);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;margin:20px auto;
  box-shadow:0 0 60px rgba(108,92,231,.4);
  animation:glow 2.5s infinite;
}

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
.hero{text-align:center;padding:48px 0 24px}
.hero-title{
  font-size:52px;font-weight:800;
  background:linear-gradient(135deg,#a29bfe 0%,var(--accent2) 50%,var(--accent3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:12px;letter-spacing:-2px;
}
.hero-sub{color:var(--muted);font-size:16px;line-height:1.5}

/* ═══════════════════════════════════════════════
   FEEDBACK BOX
═══════════════════════════════════════════════ */
.feedback-box{
  text-align:center;padding:16px;border-radius:var(--r);
  margin-bottom:8px;animation:scaleIn .3s ease;
}
.feedback-box.correct{background:rgba(0,184,148,.1);border:1px solid rgba(0,184,148,.25)}
.feedback-box.wrong{background:rgba(225,112,85,.1);border:1px solid rgba(225,112,85,.25)}
.feedback-icon{font-size:36px;display:block;margin-bottom:6px;animation:bounceIn .4s ease}
.feedback-text{font-weight:600;font-size:15px}
.feedback-pts{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--green);margin-top:4px}

/* ═══════════════════════════════════════════════
   SCORE DISPLAY
═══════════════════════════════════════════════ */
.score-display{
  text-align:center;padding:16px;
  background:var(--surface2);border-radius:var(--r-sm);
  border:1px solid var(--border);
}
.score-num{
  font-family:'Syne',sans-serif;font-weight:800;font-size:40px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.score-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase}

/* ═══════════════════════════════════════════════
   SCROLL UTILITY
═══════════════════════════════════════════════ */
.scroll-list{
  display:flex;flex-direction:column;gap:8px;
  max-height:360px;overflow-y:auto;
  padding-right:4px;
}
.scroll-list::-webkit-scrollbar{width:4px}
.scroll-list::-webkit-scrollbar-track{background:transparent}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:12px 20px;
  font-size:14px;font-weight:500;
  transition:transform .3s cubic-bezier(.22,1,.36,1);
  z-index:9998;pointer-events:none;
  white-space:nowrap;box-shadow:var(--shadow);
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════════════════
   LOADING SPINNER
═══════════════════════════════════════════════ */
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);
  border-top-color:var(--accent);
  animation:spin .8s linear infinite;
  margin:0 auto;
}

/* ═══════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════ */
@media(max-width:400px){
  .options-grid{grid-template-columns:1fr}
  .hero-title{font-size:38px}
  .question-text{font-size:18px}
}
@media(min-width:600px){
  .screen{padding:24px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script type="module">
// ─── Firebase ────────────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc, setDoc, getDoc, getDocs,
  updateDoc, onSnapshot, query, where, orderBy, increment,
  serverTimestamp, deleteDoc, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCJVh32y23TQYaVyeuARiCOjsJu9QJFqOU",
  authDomain: "quiz-realtime-290ec.firebaseapp.com",
  projectId: "quiz-realtime-290ec",
  storageBucket: "quiz-realtime-290ec.firebasestorage.app",
  messagingSenderId: "423790720358",
  appId: "1:423790720358:web:fca076cd69d434f8cd84a7"
});
const db = getFirestore(app);
const auth = getAuth(app);

// ─── Constants ───────────────────────────────────────────────────────────────
const AVATARS = ['🦊','🐺','🐸','🦁','🐯','🐻','🐼','🐨','🦅','🦋',
                 '🐙','🦄','🐲','👾','🤖','🎃','🧸','🦖','🦑','🐬',
                 '🦝','🐮','🐷','🐧','🦜'];
const LABELS = ['A','B','C','D','E','F'];

// ─── State ───────────────────────────────────────────────────────────────────
let S = {
  user: null,
  roomId: null,
  playerId: null,
  playerName: localStorage.getItem('ql_name') || '',
  playerAvatar: localStorage.getItem('ql_avatar') || '🦊',
  myScore: 0,
  unsubs: [],
};

// ─── Auth init ───────────────────────────────────────────────────────────────
async function ensureAuth() {
  if (!S.user) {
    try { S.user = (await signInAnonymously(auth)).user; S.playerId = S.user.uid; }
    catch(e) { console.error('Auth failed', e); }
  }
}

// ─── Router ──────────────────────────────────────────────────────────────────
function parseRoute() {
  const hash = location.hash.replace('#','') || '/';
  return hash.split('/').filter(Boolean);
}

window.navigate = (path) => { location.hash = path; };

window.addEventListener('hashchange', handleRoute);
window.addEventListener('load', handleRoute);

async function handleRoute() {
  await ensureAuth();
  clearSubs();
  const parts = parseRoute();
  const views = {
    '': () => renderHome(),
    'admin': () => renderAdminCreate(),
  };
  if (!parts.length) return renderHome();

  switch(parts[0]) {
    case 'admin': return renderAdminCreate();
    case 'room':
      S.roomId = parts[1];
      if (parts[2] === 'control') return renderAdminControl();
      if (parts[2] === 'ranking') return renderRanking();
      if (parts[2] === 'podium') return renderPodium();
      return renderHome();
    case 'join':
      S.roomId = parts[1];
      return renderPlayerJoin();
    case 'wait':
      S.roomId = parts[1];
      return renderPlayerWait();
    case 'play':
      S.roomId = parts[1];
      return renderPlayerGame();
    default: return renderHome();
  }
}

function clearSubs() {
  S.unsubs.forEach(u => { try{u()}catch(e){} });
  S.unsubs = [];
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function $app() { return document.getElementById('app'); }
function $(id) { return document.getElementById(id); }

function toast(msg, type='info') {
  const t = $('toast');
  const icons = { info:'💬', success:'✅', error:'❌', warn:'⚠️' };
  t.textContent = (icons[type]||'💬') + ' ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtScore(n) { return (n||0).toLocaleString('pt-BR'); }

function renderRankList(players, max=20, offset=0) {
  return players.slice(0, max).map((p, i) => {
    const rank = i + 1 + offset;
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}`;
    const cls = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const isMe = p.id === S.playerId;
    return `<div class="rank-item ${cls}${isMe?' rank-me':''}">
      <div class="rank-num">${medal}</div>
      <div class="rank-avatar">${p.avatar||'🦊'}</div>
      <div class="rank-name">${escHtml(p.nome)}${isMe?' <span class="badge badge-purple" style="font-size:10px">você</span>':''}</div>
      <div class="rank-score">${fmtScore(p.score)}</div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getJoinLink() {
  return `${location.origin}${location.pathname}#/join/${S.roomId}`;
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function renderHome() {
  $app().innerHTML = `
  <div class="screen" style="justify-content:center;min-height:100vh">
    <div class="hero">
      <div class="hero-title">QuizLive</div>
      <p class="hero-sub">Quiz interativo em tempo real<br>para grupos, turmas e eventos</p>
    </div>

    <button class="btn btn-primary" id="btn-admin">
      <span>🎮</span> Criar sala (Admin)
    </button>

    <div class="divider-text">ou entre numa sala</div>

    <div class="card">
      <div class="card-title">Código da sala</div>
      <div style="display:flex;gap:8px">
        <input id="join-code" placeholder="Cole o código aqui…"
          style="text-transform:uppercase;letter-spacing:2px;font-family:'Syne',sans-serif"
          maxlength="30" autocomplete="off" spellcheck="false"/>
        <button class="btn btn-primary btn-sm" id="btn-join-code" style="white-space:nowrap;padding:11px 18px">Entrar</button>
      </div>
    </div>

    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:auto;padding-top:16px">
      📱 Escaneie o QR Code ou use o link da sala para entrar
    </p>
  </div>`;

  $('btn-admin').onclick = () => navigate('/admin');
  $('btn-join-code').onclick = () => {
    const code = $('join-code').value.trim();
    if (!code) return toast('Digite o código da sala','warn');
    S.roomId = code;
    navigate('/join/' + code);
  };
  $('join-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-join-code').click();
  });
}

// ─── ADMIN CREATE ────────────────────────────────────────────────────────────
function renderAdminCreate() {
  let questions = [];
  let editingIdx = null;

  function buildHTML() {
    const qListHtml = questions.length === 0
      ? `<div style="text-align:center;padding:24px 0;color:var(--muted);font-size:14px">
           <div style="font-size:32px;margin-bottom:8px">📝</div>
           Nenhuma pergunta ainda
         </div>`
      : questions.map((q,i) => `
        <div class="q-list-item">
          <span class="q-list-num">#${i+1}</span>
          <div style="flex:1">
            <div class="q-list-text">${escHtml(q.pergunta)}</div>
            <div class="q-list-meta">${q.pontuacao} pts &nbsp;·&nbsp; Correta: <b>${LABELS[q.correta]}</b> — ${escHtml(q.opcoes[q.correta]||'')}</div>
          </div>
          <button class="btn btn-secondary btn-icon" onclick="window._editQ(${i})" title="Editar">✏️</button>
          <button class="btn btn-danger btn-icon" onclick="window._delQ(${i})" title="Remover">🗑</button>
        </div>`).join('');

    const btnLabel = editingIdx !== null ? '✓ Salvar alterações' : '+ Adicionar pergunta';
    const cancelBtn = editingIdx !== null
      ? `<button class="btn btn-ghost btn-sm" id="btn-cancel-edit">Cancelar</button>` : '';

    return `
    <div class="top-bar">
      <span class="logo">QuizLive</span>
      <button class="btn btn-ghost btn-sm" id="btn-home">← Home</button>
    </div>
    <div class="screen wide">

      <div class="card">
        <div class="card-title">⚙️ Configurar sala</div>
        <div class="input-wrap">
          <label>Nome da sala</label>
          <input id="room-name" placeholder="Ex: Trivia de Ciências — Turma B" value="${escHtml(S.draftName||'')}"/>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 Perguntas <span class="badge badge-purple">${questions.length}</span></div>
        <div class="scroll-list" id="q-list" style="max-height:280px;margin-bottom:14px">${qListHtml}</div>

        <div class="q-builder" id="q-builder">
          <div class="q-builder-title">
            ${editingIdx!==null?'✏️ Editando pergunta':'✨ Nova pergunta'}
          </div>
          <div class="input-wrap">
            <label>Enunciado</label>
            <textarea id="q-text" placeholder="Digite a pergunta aqui…" rows="2"></textarea>
          </div>
          <div style="color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-top:4px">Opções (marque a correta →)</div>
          ${[0,1,2,3].map(i=>`
          <div class="option-row">
            <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--muted);min-width:16px">${LABELS[i]}</span>
            <input id="opt-${i}" placeholder="Opção ${LABELS[i]}"/>
            <input type="radio" name="correct-opt" value="${i}" class="correct-radio" title="Esta é a correta"/>
          </div>`).join('')}
          <div class="input-wrap">
            <label>Pontuação</label>
            <input id="q-pts" type="number" value="100" min="10" max="1000" step="10"/>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-success btn-sm" id="btn-add-q">${btnLabel}</button>
            ${cancelBtn}
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-create" style="font-size:16px;padding:15px">
        🚀 Criar sala e gerar QR Code
      </button>
    </div>`;
  }

  function bind() {
    $('btn-home').onclick = () => navigate('/');
    $('room-name').oninput = (e) => { S.draftName = e.target.value; };

    $('btn-add-q').onclick = () => {
      const pergunta = $('q-text').value.trim();
      const opcoes = [0,1,2,3].map(i => $('opt-'+i).value.trim());
      const correctEl = document.querySelector('input[name="correct-opt"]:checked');
      const pontuacao = parseInt($('q-pts').value) || 100;
      if (!pergunta) return toast('Digite o enunciado','warn');
      if (opcoes.filter(Boolean).length < 2) return toast('Adicione ao menos 2 opções','warn');
      if (!correctEl) return toast('Marque a resposta correta','warn');
      const q = { pergunta, opcoes, correta: parseInt(correctEl.value), pontuacao };
      if (editingIdx !== null) { questions[editingIdx] = q; editingIdx = null; }
      else questions.push(q);
      redraw();
    };

    $('btn-cancel-edit')?.addEventListener('click', () => { editingIdx = null; redraw(); });
    $('btn-create').onclick = createRoom;

    window._editQ = (i) => {
      editingIdx = i;
      redraw();
      const q = questions[i];
      $('q-text').value = q.pergunta;
      q.opcoes.forEach((o,j) => { if($('opt-'+j)) $('opt-'+j).value = o; });
      const radio = document.querySelector(`input[name="correct-opt"][value="${q.correta}"]`);
      if (radio) radio.checked = true;
      $('q-pts').value = q.pontuacao;
      $('q-text').focus();
    };
    window._delQ = (i) => { questions.splice(i,1); redraw(); };
  }

  function redraw() {
    $app().innerHTML = buildHTML();
    bind();
    if (editingIdx !== null) {
      const q = questions[editingIdx];
      if ($('q-text')) $('q-text').value = q.pergunta;
      q.opcoes.forEach((o,j) => { if($('opt-'+j)) $('opt-'+j).value = o; });
      const radio = document.querySelector(`input[name="correct-opt"][value="${q.correta}"]`);
      if (radio) radio.checked = true;
      if ($('q-pts')) $('q-pts').value = q.pontuacao;
    }
  }

  async function createRoom() {
    const nome = $('room-name').value.trim();
    if (!nome) return toast('Digite o nome da sala','warn');
    if (questions.length === 0) return toast('Adicione ao menos uma pergunta','warn');
    const btn = $('btn-create');
    btn.disabled = true; btn.textContent = '⏳ Criando sala…';
    try {
      const roomRef = await addDoc(collection(db,'rooms'), {
        nome, status:'waiting', currentQuestion:0,
        adminUid: S.user?.uid || '',
        criadoEm: serverTimestamp(),
        totalQuestions: questions.length,
      });
      S.roomId = roomRef.id;
      for (let i = 0; i < questions.length; i++) {
        await addDoc(collection(db,'questions'), { ...questions[i], roomId: S.roomId, ordem: i });
      }
      navigate('/room/' + S.roomId + '/control');
    } catch(e) {
      toast('Erro ao criar sala: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '🚀 Criar sala';
    }
  }

  $app().innerHTML = buildHTML();
  bind();
}

// ─── ADMIN CONTROL ───────────────────────────────────────────────────────────
function renderAdminControl() {
  const roomId = S.roomId;
  let room=null, questions=[], players=[], answers=[];
  let qrDone = false;

  $app().innerHTML = `
  <div class="top-bar">
    <span class="logo">QuizLive</span>
    <span id="room-badge" class="badge badge-yellow">Aguardando</span>
  </div>
  <div class="screen wide" id="ctrl-main"></div>`;

  function draw() {
    const main = $('ctrl-main');
    if (!main || !room) return;

    // Update badge
    const badge = $('room-badge');
    if (badge) {
      const map = { waiting:['badge-yellow','⏳ Aguardando'], playing:['badge-green badge-live','🔴 Ao vivo'], finished:['badge-red','🏁 Encerrado'] };
      const [cls,txt] = map[room.status] || ['badge-yellow','?'];
      badge.className = 'badge ' + cls;
      badge.textContent = txt;
    }

    const cq = room.currentQuestion || 0;
    const totalQ = questions.length;
    const currentQ = questions[cq];
    const answeredCount = answers.filter(a => a.questionId === currentQ?.id).length;
    const pct = players.length ? Math.round(answeredCount / players.length * 100) : 0;

    if (room.status === 'waiting') {
      main.innerHTML = `
      <div class="card card-glow" style="text-align:center">
        <div class="card-title">🔗 Link & QR Code</div>
        <div class="qr-wrap"><canvas id="qr-canvas" width="180" height="180"></canvas></div>
        <div style="font-size:12px;color:var(--muted);margin:10px 0 6px;word-break:break-all">${getJoinLink()}</div>
        <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('${getJoinLink()}');window._toast('✅ Link copiado!','success')">
          📋 Copiar link
        </button>
      </div>

      <div class="card">
        <div class="card-title">👥 Participantes <span class="badge badge-purple">${players.length}</span></div>
        <div class="player-chips" id="chips">
          ${players.length
            ? players.map(p=>`<div class="player-chip"><span>${p.avatar}</span><span>${escHtml(p.nome)}</span></div>`).join('')
            : '<span style="color:var(--muted);font-size:13px">Aguardando jogadores…</span>'}
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 ${totalQ} perguntas cadastradas</div>
        <div class="scroll-list" style="max-height:200px">
          ${questions.map((q,i)=>`
          <div class="q-list-item">
            <span class="q-list-num">#${i+1}</span>
            <div class="q-list-text">${escHtml(q.pergunta)}</div>
            <span class="badge badge-purple">${q.pontuacao}pts</span>
          </div>`).join('')}
        </div>
      </div>

      ${players.length > 0
        ? `<button class="btn btn-primary" id="btn-start" style="font-size:16px;padding:15px">🚀 Iniciar jogo (${players.length} jogador${players.length>1?'es':''})</button>`
        : `<button class="btn btn-primary" disabled style="padding:15px">Aguardando jogadores…</button>`}`;

      // generate QR
      setTimeout(() => {
        const canvas = $('qr-canvas');
        if (canvas && !qrDone) {
          qrDone = true;
          QRCode.toCanvas(canvas, getJoinLink(), {
            width:180,margin:1,
            color:{dark:'#1a0a2e',light:'#ffffff'}
          });
        }
      }, 80);

      $('btn-start')?.addEventListener('click', () =>
        updateDoc(doc(db,'rooms',roomId), {status:'playing', currentQuestion:0})
      );

    } else if (room.status === 'playing') {
      main.innerHTML = `
      <div class="q-progress">
        ${questions.map((_,i) => `<div class="q-dot ${i<cq?'done':i===cq?'current':''}"></div>`).join('')}
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="color:var(--muted);font-size:13px">Pergunta ${cq+1} de ${totalQ}</span>
          <span class="badge badge-purple">${currentQ?.pontuacao||0} pts</span>
        </div>
        <div style="font-size:17px;font-weight:600;line-height:1.4;margin-bottom:14px">${currentQ?.pergunta||''}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          ${(currentQ?.opcoes||[]).map((o,i)=>`
          <div style="padding:8px 12px;border-radius:var(--r-sm);font-size:13px;
            border:1.5px solid ${i===currentQ?.correta?'var(--green)':'var(--border)'};
            background:${i===currentQ?.correta?'rgba(0,184,148,.1)':'var(--surface2)'};
            color:${i===currentQ?.correta?'var(--green)':'var(--text2)'}">
            <b>${LABELS[i]}</b> ${escHtml(o)}
          </div>`).join('')}
        </div>
        <div class="answer-count">
          <span style="font-size:18px">✍️</span>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
              <span style="font-size:13px;color:var(--muted)">Respostas</span>
              <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px">
                <span style="color:var(--accent)">${answeredCount}</span>
                <span style="color:var(--muted)">&nbsp;/&nbsp;${players.length}</span>
              </span>
            </div>
            <div class="answer-bar"><div class="answer-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-num">${players.length}</div>
          <div class="stat-label">Jogadores</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${pct}%</div>
          <div class="stat-label">Responderam</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px">
        ${cq < totalQ-1
          ? `<button class="btn btn-primary" id="btn-next" style="padding:14px">Próxima pergunta →</button>`
          : `<button class="btn btn-success" id="btn-finish" style="padding:14px">🏁 Encerrar e ver pódio</button>`}
        <button class="btn btn-danger btn-sm" id="btn-end">⏹ Encerrar jogo agora</button>
      </div>

      <div class="card">
        <div class="card-title">📊 Ranking parcial</div>
        <div class="rank-list">${renderRankList(players, 5)}</div>
      </div>`;

      $('btn-next')?.addEventListener('click', () =>
        updateDoc(doc(db,'rooms',roomId), {currentQuestion: cq+1})
      );
      $('btn-finish')?.addEventListener('click', () =>
        updateDoc(doc(db,'rooms',roomId), {status:'finished'}).then(() => navigate('/room/'+roomId+'/podium'))
      );
      $('btn-end')?.addEventListener('click', () =>
        updateDoc(doc(db,'rooms',roomId), {status:'finished'})
      );

    } else {
      main.innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:56px;margin-bottom:12px">🏁</div>
        <div class="card-title" style="font-size:20px;text-transform:none">Jogo encerrado!</div>
        <p style="color:var(--muted);font-size:14px;margin-top:6px">${players.length} participantes · ${totalQ} perguntas</p>
      </div>
      <button class="btn btn-primary" onclick="navigate('/room/${roomId}/podium')">🏆 Ver pódio</button>
      <button class="btn btn-secondary" onclick="navigate('/room/${roomId}/ranking')">📊 Ranking completo</button>
      <button class="btn btn-ghost" onclick="navigate('/admin')">+ Criar nova sala</button>`;
    }
  }

  S.unsubs.push(onSnapshot(doc(db,'rooms',roomId), s => { room={id:s.id,...s.data()}; draw(); }));
  S.unsubs.push(onSnapshot(query(collection(db,'questions'),where('roomId','==',roomId),orderBy('ordem')), s => {
    questions = s.docs.map(d=>({id:d.id,...d.data()})); draw();
  }));
  S.unsubs.push(onSnapshot(query(collection(db,'players'),where('roomId','==',roomId)), s => {
    players = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0)); draw();
  }));
  S.unsubs.push(onSnapshot(query(collection(db,'answers'),where('roomId','==',roomId)), s => {
    answers = s.docs.map(d=>d.data());
  }));

  window._toast = toast;
}

// ─── PLAYER JOIN ─────────────────────────────────────────────────────────────
function renderPlayerJoin() {
  const roomId = S.roomId;
  let avatar = S.playerAvatar || '🦊';

  $app().innerHTML = `
  <div class="top-bar">
    <span class="logo">QuizLive</span>
    <button class="btn btn-ghost btn-sm" onclick="navigate('/')">← Home</button>
  </div>
  <div class="screen">
    <div style="text-align:center;padding:20px 0 8px">
      <div style="font-size:48px;margin-bottom:8px">${avatar}</div>
      <h2 style="font-size:22px;font-weight:700">Entrar na sala</h2>
      <p style="color:var(--muted);font-size:14px;margin-top:4px">Sala: <code style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:13px">${escHtml(roomId)}</code></p>
    </div>

    <div class="card">
      <div class="card-title">Como te chamamos?</div>
      <input id="pname" placeholder="Seu nome ou apelido…" value="${escHtml(S.playerName)}" maxlength="24" autocomplete="given-name"/>
    </div>

    <div class="card">
      <div class="card-title">Escolha seu avatar</div>
      <div class="avatar-grid" id="av-grid">
        ${AVATARS.map(a=>`<div class="avatar-opt${a===avatar?' selected':''}" data-av="${a}" tabindex="0">${a}</div>`).join('')}
      </div>
    </div>

    <button class="btn btn-primary" id="btn-enter" style="padding:15px;font-size:16px">
      🎮 Entrar na sala
    </button>
  </div>`;

  // Avatar picking
  document.querySelectorAll('.avatar-opt').forEach(el => {
    el.onclick = () => {
      avatar = el.dataset.av;
      document.querySelectorAll('.avatar-opt').forEach(e => e.classList.toggle('selected', e.dataset.av===avatar));
      document.querySelector('.wait-orb, .avatar-preview') && (document.querySelector('.avatar-preview').textContent=avatar);
    };
  });

  $('btn-enter').onclick = async () => {
    const nome = $('pname').value.trim();
    if (!nome) return toast('Digite seu nome 👆','warn');
    const btn = $('btn-enter');
    btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:22px;height:22px;border-width:2px"></div> Entrando…';

    try {
      const snap = await getDoc(doc(db,'rooms',roomId));
      if (!snap.exists()) { toast('Sala não encontrada ❌','error'); btn.disabled=false; btn.textContent='🎮 Entrar'; return; }
      const roomData = snap.data();
      if (roomData.status === 'finished') { toast('Esta sala já encerrou','error'); btn.disabled=false; return; }

      S.playerName = nome;
      S.playerAvatar = avatar;
      localStorage.setItem('ql_name', nome);
      localStorage.setItem('ql_avatar', avatar);
      S.playerId = S.user.uid;

      await setDoc(doc(db,'players',S.playerId), {
        nome, avatar, score:0, roomId,
        entradoEm: serverTimestamp(),
      });

      navigate(roomData.status === 'playing' ? '/play/'+roomId : '/wait/'+roomId);
    } catch(e) {
      toast('Erro: ' + e.message,'error');
      btn.disabled=false; btn.innerHTML='🎮 Entrar na sala';
    }
  };

  $('pname').focus();
}

// ─── PLAYER WAIT ─────────────────────────────────────────────────────────────

  const roomId = S.roomId;

  <div class="screen" style="justify-content:center;align-items:center;text-align:center;min-height:100vh">
    <div class="wait-orb">${S.playerAvatar||'🦊'}</div>
    <h2 style="font-weight:700;font-size:22px">${escHtml(S.playerName||'Jogador')}</h2>
    <p style="color:var(--muted);margin:6px 0 28px">Você está na fila! 🎉</p>
    <div style="color:var(--muted);font-size:15px">
      Aguardando o admin iniciar o jogo…
    </div>
    <div id="p-count" style="margin-top:20px"></div>
    <div style="margin-top:32px;color:var(--muted);font-size:13px">
      Sala: <code style="background:var(--surface2);padding:2px 8px;border-radius:4px">${escHtml(roomId)}</code>

// ─── PLAYER GAME ─────────────────────────────────────────────────────────────
function renderPlayerGame() {
  const roomId = S.roomId;
  const playerId = S.playerId || S.user?.uid;
  let questions=[], room=null, answered={};
  let myTotalScore = 0;

  $app().innerHTML = `<div class="screen" id="game-main"></div>`;

  function draw() {
    const main = $('game-main');
    if (!main || !room) return;
    const cq = room.currentQuestion || 0;
    const q = questions[cq];
    const totalQ = questions.length;

    // Game over
    if (room.status === 'finished') {
      main.innerHTML = `
      <div style="text-align:center;padding:48px 0">
        <div style="font-size:64px;margin-bottom:16px">🏁</div>
        <h2 style="font-weight:700;font-size:26px;margin-bottom:8px">Fim de jogo!</h2>
        <p style="color:var(--muted);margin-bottom:24px">Veja como você se saiu</p>
        <div class="score-display" style="margin-bottom:20px">
          <div class="score-label">Sua pontuação final</div>
          <div class="score-num">${fmtScore(myTotalScore)}</div>
        </div>
        <button class="btn btn-primary" onclick="navigate('/room/${roomId}/podium')" style="margin-bottom:10px">🏆 Ver pódio</button>
        <button class="btn btn-secondary" onclick="navigate('/')">🏠 Início</button>
      </div>`;
      return;
    }

    if (!q) {
      main.innerHTML = `
      <div style="text-align:center;padding:60px 0">
        <div style="font-size:48px;margin-bottom:16px;animation:pulse 2s infinite">⏳</div>
        <p style="color:var(--muted)">Aguardando próxima pergunta…</p>
      </div>`;
      return;
    }

    const myAnswer = answered[q.id];
    const hasAnswered = myAnswer !== undefined;

    const progress = `<div class="q-progress">${questions.map((_,i)=>`<div class="q-dot ${i<cq?'done':i===cq?'current':''}"></div>`).join('')}</div>`;

    let feedbackHtml = '';
    if (hasAnswered) {
      const ok = myAnswer === q.correta;
      feedbackHtml = `
      <div class="feedback-box ${ok?'correct':'wrong'}">
        <span class="feedback-icon">${ok?'✅':'❌'}</span>
        <div class="feedback-text" style="color:${ok?'var(--green)':'var(--red)'}">${ok?'Acertou!':'Errou…'}</div>
        ${ok ? `<div class="feedback-pts">+${fmtScore(q.pontuacao)}</div>` : `<div style="font-size:13px;color:var(--muted);margin-top:4px">Correta: <b>${LABELS[q.correta]}</b> — ${escHtml(q.opcoes[q.correta])}</div>`}
      </div>`;
    }

    const optsHtml = (q.opcoes||[]).filter(Boolean).map((o,i) => {
      let cls = '';
      if (hasAnswered) {
        if (i === q.correta) cls = 'correct';
        else if (i === myAnswer) cls = 'wrong';
      }
      const disabled = hasAnswered ? 'disabled' : '';
      return `<button class="opt-btn ${cls}" ${disabled} onclick="window._ans(${i})">
        <div class="opt-label">${LABELS[i]}</div>
        ${escHtml(o)}
      </button>`;
    }).join('');

    main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="color:var(--muted);font-size:13px">${cq+1} / ${totalQ}</span>
      <span class="badge badge-purple">${q.pontuacao} pts</span>
    </div>
    ${progress}
    <div class="question-text">${escHtml(q.pergunta)}</div>
    ${feedbackHtml}
    <div class="options-grid">${optsHtml}</div>
    <div class="score-display" style="margin-top:12px">
      <div class="score-label">Pontuação</div>
      <div class="score-num">${fmtScore(myTotalScore)}</div>
    </div>`;

    window._ans = async (idx) => {
      if (answered[q.id] !== undefined) return;
      answered[q.id] = idx;

      // optimistic UI
      const btn = document.querySelectorAll('.opt-btn')[idx];
      if (btn) btn.classList.add('pending');

      const isCorrect = idx === q.correta;
      const pts = isCorrect ? q.pontuacao : 0;
      const ansId = `${playerId}_${q.id}`;

      try {
        const exists = await getDoc(doc(db,'answers',ansId));
        if (!exists.exists()) {
          await setDoc(doc(db,'answers',ansId), {
            playerId, questionId:q.id, roomId,
            resposta:idx, correta:isCorrect, pontosGanhos:pts,
            ts: serverTimestamp(),
          });
          if (pts > 0) {
            myTotalScore += pts;
            await updateDoc(doc(db,'players',playerId), { score: increment(pts) });
          }
        }
      } catch(e) { console.error(e); }
      draw();
    };
  }

  // Subscriptions
  S.unsubs.push(onSnapshot(doc(db,'rooms',roomId), s => { room={id:s.id,...s.data()}; draw(); }));
  S.unsubs.push(onSnapshot(query(collection(db,'questions'),where('roomId','==',roomId),orderBy('ordem')), s => {
    questions = s.docs.map(d=>({id:d.id,...d.data()})); draw();
  }));
  S.unsubs.push(onSnapshot(query(collection(db,'answers'),where('playerId','==',playerId),where('roomId','==',roomId)), s => {
    myTotalScore = 0;
    s.docs.forEach(d => {
      const data = d.data();
      answered[data.questionId] = data.resposta;
      myTotalScore += (data.pontosGanhos || 0);
    });
    draw();
  }));
}

// ─── RANKING ─────────────────────────────────────────────────────────────────
function renderRanking() {
  const roomId = S.roomId;
  $app().innerHTML = `
  <div class="top-bar">
    <span class="logo">📊 Ranking</span>
    <button class="btn btn-ghost btn-sm" onclick="history.back()">← Voltar</button>
  </div>
  <div class="screen" id="rank-main">
    <div style="text-align:center;padding:20px"><div class="spinner"></div></div>
  </div>`;

  S.unsubs.push(onSnapshot(query(collection(db,'players'),where('roomId','==',roomId)), s => {
    const players = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0));

    main.innerHTML = `

      <span class="badge badge-purple">👥 ${players.length} jogadores</span>
    </div>

}

      <span class="badge badge-yellow">🎉 Resultado final!</span>
    </div>

    <div class="podium">
      <div class="podium-col">
        ${p2 ? `
        <div class="podium-emoji">${p2.avatar||'🦊'}</div>
        <div class="podium-name">${escHtml(p2.nome)}</div>
        <div class="podium-score">${fmtScore(p2.score)}</div>
        <div class="podium-block p2">2</div>` : '<div class="podium-block p2" style="height:72px"></div>'}
      </div>
      <div class="podium-col">
        ${p1 ? `
        <div class="podium-emoji first">${p1.avatar||'🦊'}</div>
        <div class="podium-name" style="font-weight:700">${escHtml(p1.nome)}</div>
        <div class="podium-score">${fmtScore(p1.score)}</div>
        <div class="podium-block p1">1</div>` : '<div class="podium-block p1" style="height:100px"></div>'}
      </div>
      <div class="podium-col">
        ${p3 ? `
        <div class="podium-emoji">${p3.avatar||'🦊'}</div>
        <div class="podium-name">${escHtml(p3.nome)}</div>
        <div class="podium-score">${fmtScore(p3.score)}</div>
        <div class="podium-block p3">3</div>` : '<div class="podium-block p3" style="height:54px"></div>'}
      </div>
    </div>

    ${rest.length ? `
    <div class="card">
      <div class="card-title">Outros participantes</div>
      <div class="rank-list">${renderRankList(rest, rest.length, 3)}</div>
    </div>` : ''}

    <button class="btn btn-secondary" onclick="navigate('/room/${roomId}/ranking')">📊 Ver ranking completo</button>
    <button class="btn btn-ghost" onclick="navigate('/')">🏠 Início</button>`;
  }));
}
