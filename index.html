<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>QuizLive ⚡ Quiz em Tempo Real</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root{
  --bg:#07071a;--surface:#0e0e26;--surface2:#15152f;--surface3:#1c1c3a;
  --border:#252545;--border2:#30305a;
  --accent:#6843ff;--accent2:#ff2d78;--accent3:#00d4ff;--accent4:#ffd60a;
  --text:#f0eeff;--text2:#a8a8cc;--muted:#606080;
  --green:#00ff88;--red:#ff4466;
  --r:16px;--r-sm:12px;--r-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.5;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4;
}
h1,h2,h3,h4{font-family:'Clash Display','Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ── Layout ── */
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center}
.screen{
  width:100%;max-width:480px;padding:20px 16px 48px;
  display:flex;flex-direction:column;gap:14px;
  animation:slideUp .35s cubic-bezier(.22,1,.36,1);
}
.screen.wide{max-width:700px}
.screen.center{align-items:center;justify-content:center;min-height:100vh;text-align:center}

/* ── Animations ── */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow{from{box-shadow:0 0 20px rgba(104,67,255,.4)}to{box-shadow:0 0 40px rgba(104,67,255,.8),0 0 80px rgba(104,67,255,.3)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── TopBar ── */
.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;width:100%;
  background:rgba(7,7,26,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Clash Display',sans-serif;font-weight:700;font-size:20px;
  background:linear-gradient(135deg,#9b6bff,#ff2d78);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Card ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card-glow{box-shadow:0 0 40px rgba(104,67,255,.2);border-color:rgba(104,67,255,.4)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:var(--r-sm);font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;border:none;
  transition:all .18s cubic-bezier(.22,1,.36,1);
  text-decoration:none;width:100%;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.07),transparent);pointer-events:none}
.btn-primary{background:linear-gradient(135deg,#6843ff,#9b6bff);color:#fff;box-shadow:0 4px 20px rgba(104,67,255,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(104,67,255,.6)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:#a48eff;background:var(--surface3)}
.btn-danger{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.25)}
.btn-danger:hover{background:rgba(255,68,102,.2)}
.btn-success{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.btn-success:hover{background:rgba(0,255,136,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:var(--r-xs)}
.btn-xs{padding:5px 10px;font-size:12px;width:auto;border-radius:6px}
.btn-ghost{background:transparent;color:var(--muted);width:auto}
.btn-ghost:hover{color:var(--text)}

/* ── Inputs ── */
.inp{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r-xs);color:var(--text);
  font-family:'Space Grotesk',sans-serif;font-size:15px;
  padding:11px 14px;width:100%;transition:all .18s;outline:none;
}
.inp:focus{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 3px rgba(104,67,255,.15)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:64px}
select.inp{cursor:pointer}
select.inp option{background:var(--surface2)}
label.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);display:block;margin-bottom:6px}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;
}
.badge-purple{background:rgba(104,67,255,.12);color:#a48eff;border:1px solid rgba(104,67,255,.25)}
.badge-green{background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.2)}
.badge-red{background:rgba(255,68,102,.08);color:#ff4466;border:1px solid rgba(255,68,102,.2)}
.badge-yellow{background:rgba(255,214,10,.08);color:#ffd60a;border:1px solid rgba(255,214,10,.2)}
.badge-live{animation:glow 2s infinite}

/* ── Spinner ── */
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto}
.spinner-sm{width:20px;height:20px;border-width:2px}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:4px 0}
.divider-text{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px}
.divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Avatar Grid ── */
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.av{
  aspect-ratio:1;border-radius:50%;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:var(--surface2);border:2px solid var(--border2);
  transition:all .2s cubic-bezier(.22,1,.36,1);user-select:none;
}
.av:hover{border-color:var(--accent);transform:scale(1.1)}
.av.sel{border-color:var(--accent);background:rgba(104,67,255,.2);transform:scale(1.12);box-shadow:0 0 0 3px rgba(104,67,255,.2)}

/* ── Option Buttons (quiz) ── */
.opt-btn{
  padding:14px;border-radius:var(--r);font-size:14px;font-weight:500;
  cursor:pointer;border:2px solid;background:rgba(0,0,0,.15);
  color:var(--text);transition:all .2s cubic-bezier(.22,1,.36,1);
  text-align:left;line-height:1.4;width:100%;position:relative;overflow:hidden;
}
.opt-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);filter:brightness(1.2)}
.opt-btn:disabled{cursor:default}
.opt-a{border-color:#e74c3c;background:rgba(231,76,60,.1)}
.opt-b{border-color:#3498db;background:rgba(52,152,219,.1)}
.opt-c{border-color:#2ecc71;background:rgba(46,204,113,.1)}
.opt-d{border-color:#f39c12;background:rgba(243,156,18,.1)}
.opt-e{border-color:#9b59b6;background:rgba(155,89,182,.1)}
.opt-f{border-color:#1abc9c;background:rgba(26,188,156,.1)}
.opt-btn.correct{background:rgba(0,255,136,.12)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt-btn.wrong{background:rgba(255,68,102,.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.opt-label{
  display:inline-flex;width:24px;height:24px;border-radius:50%;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:700;margin-right:8px;
  background:rgba(255,255,255,.08);flex-shrink:0;
}

/* ── Progress dots ── */
.dot-row{display:flex;gap:4px;margin-bottom:4px}
.dot{flex:1;height:5px;border-radius:99px;background:var(--border2);transition:all .3s}
.dot.done{background:var(--accent);opacity:.6}
.dot.cur{background:var(--accent);box-shadow:0 0 8px rgba(104,67,255,.7)}

/* ── Timer bar ── */
.timer-wrap{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:4px}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 1s linear}
.timer-fill.warn{background:linear-gradient(90deg,#ff6b35,#ff2d78)}

/* ── Ranking ── */
.rank-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);transition:all .25s;
  animation:slideRight .3s ease both;
}
.rank-item.me{border-color:var(--accent)!important;background:rgba(104,67,255,.08)!important}
.rank-item.r1{border-color:rgba(255,214,10,.4);background:rgba(255,214,10,.04)}
.rank-item.r2{border-color:rgba(192,192,220,.3)}
.rank-item.r3{border-color:rgba(205,124,50,.3)}
.rank-num{font-family:'Clash Display',sans-serif;font-weight:800;font-size:17px;min-width:32px;text-align:center}
.rank-score{font-family:'Clash Display',sans-serif;font-weight:700;font-size:17px;color:var(--accent);white-space:nowrap}

/* ── Podium ── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:20px 0}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.pod-block{border-radius:var(--r-sm) var(--r-sm) 0 0;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-weight:800;font-size:26px;animation:scaleIn .5s ease both;width:84px}
.pod-p1{height:100px;background:linear-gradient(180deg,#ffd60a,#e6b800);color:#1a1000;animation-delay:.1s;box-shadow:0 -4px 24px rgba(255,214,10,.3)}
.pod-p2{height:72px;background:linear-gradient(180deg,#b2bec3,#7f8c8d);color:#0a0e1a;animation-delay:.2s}
.pod-p3{height:54px;background:linear-gradient(180deg,#cd7c32,#8d4e0e);color:#1a0800;animation-delay:.3s}
.pod-emoji{font-size:38px;line-height:1;animation:bounceIn .6s ease both}
.pod-emoji.big{font-size:52px;animation-delay:.1s}

/* ── QR ── */
.qr-wrap{background:#fff;border-radius:var(--r);padding:12px;display:inline-block;margin:0 auto;box-shadow:0 0 0 8px rgba(255,255,255,.06)}

/* ── Answer count ── */
.ans-bar{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.ans-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease}

/* ── Orb ── */
.orb{
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#9b6bff,var(--accent),#3a1ecc);
  display:flex;align-items:center;justify-content:center;font-size:52px;
  box-shadow:0 0 60px rgba(104,67,255,.5);animation:glow 2.5s infinite alternate,float 3s ease-in-out infinite;
}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:12px 20px;font-size:14px;font-weight:500;
  transition:transform .3s cubic-bezier(.22,1,.36,1);z-index:9998;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:90vw;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Hero ── */
.hero-title{
  font-family:'Clash Display',sans-serif;font-weight:700;font-size:56px;
  letter-spacing:-2px;line-height:1;
  background:linear-gradient(135deg,#c4b0ff 0%,#ff2d78 50%,#00d4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Feedback ── */
.feedback{text-align:center;padding:16px;border-radius:var(--r);animation:scaleIn .3s ease}
.feedback.ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25)}
.feedback.ko{background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.2)}

/* ── Scroll list ── */
.scroll-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;padding-right:4px}
.scroll-list::-webkit-scrollbar{width:4px}

/* ── Option stat bar (admin) ── */
.stat-opt{padding:10px 12px;border-radius:var(--r-sm);position:relative;overflow:hidden;border:1.5px solid}
.stat-bar{position:absolute;inset:0;opacity:.15;transition:width .4s ease;width:0}

/* ── Chip (player list) ── */
.chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;font-size:13px;animation:scaleIn .25s ease}

/* ── Question builder ── */
.q-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);animation:fadeIn .3s ease}
.opt-row{display:flex;gap:8px;align-items:center}
.correct-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0;transition:all .2s;border:2px solid}

/* ── Score box ── */
.score-box{text-align:center;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm)}
.score-num{font-family:'Clash Display',sans-serif;font-weight:800;font-size:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Mobile ── */
@media(max-width:400px){
  .hero-title{font-size:42px}
  .opt-grid{grid-template-columns:1fr}
}
</style>
</head>

<script type="module">
/* ── Firebase ──────────────────────────────────────────────────────── */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import {
  getFirestore,collection,addDoc,doc,setDoc,getDoc,
  updateDoc,onSnapshot,query,where,orderBy,increment,
  serverTimestamp,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCJVh32y23TQYaVyeuARiCOjsJu9QJFqOU",
  authDomain:"quiz-realtime-290ec.firebaseapp.com",
  projectId:"quiz-realtime-290ec",
  storageBucket:"quiz-realtime-290ec.firebasestorage.app",
  messagingSenderId:"423790720358",
  appId:"1:423790720358:web:fca076cd69d434f8cd84a7"
}
const fbApp = initializeApp(FIREBASE_CONFIG)
const db = getFirestore(fbApp)
const auth = getAuth(fbApp)

/* ── Constants ─────────────────────────────────────────────────────── */
const AVATARS = ['🦊','🐺','🐸','🦁','🐯','🐻','🐼','🐨','🦅','🦋',
                 '🐙','🦄','🐲','👾','🤖','🎃','🧸','🦖','🦑','🐬',
                 '🦝','🐮','🐷','🐧','🦜','🦩','🦚','🐉','🧟','🥷']
const LABELS = ['A','B','C','D','E','F']
const OPT_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c']
const OPT_CLS = ['opt-a','opt-b','opt-c','opt-d','opt-e','opt-f']

/* ── State ─────────────────────────────────────────────────────────── */
let S = {
  user: null,
  roomId: null,
  playerName: localStorage.getItem('ql_name') || '',
  playerAvatar: localStorage.getItem('ql_avatar') || '🦊',
  myScore: 0,
  unsubs: [],
  timerInterval: null,
  autoTimeout: null,
}

/* ── Auth ──────────────────────────────────────────────────────────── */
async function ensureAuth() {
  if (S.user) return
  try {
    const c = await signInAnonymously(auth)
    S.user = c.user
  } catch(e) { console.error('Auth:', e) }
}

/* ── Router ────────────────────────────────────────────────────────── */
function parseRoute() {
  return (location.hash.replace('#','') || '/').split('/').filter(Boolean)
}
function navigate(path) { location.hash = path }
window.addEventListener('hashchange', handleRoute)
window.addEventListener('load', () => ensureAuth().then(handleRoute))

async function handleRoute() {
  clearSubs()
  clearInterval(S.timerInterval)
  clearTimeout(S.autoTimeout)
  const p = parseRoute()
  if (!p.length) return renderHome()
  switch(p[0]) {
    case 'admin':    return renderAdminCreate()
    case 'history':  return renderHistory()
    case 'room':
      S.roomId = p[1]
      if (p[2]==='control') return renderAdminControl()
      if (p[2]==='ranking') return renderRanking()
      if (p[2]==='podium')  return renderPodium()
      return renderHome()
    case 'join': S.roomId = p[1]; return renderJoin()
    case 'wait': S.roomId = p[1]; return renderWait()
    case 'play': S.roomId = p[1]; return renderPlay()
    default: return renderHome()
  }
}

function clearSubs() {
  S.unsubs.forEach(u => { try{u()}catch(e){} })
  S.unsubs = []
}

/* ── Helpers ───────────────────────────────────────────────────────── */
const $app = () => document.getElementById('app')
const $  = id => document.getElementById(id)
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const fmt = n => (n||0).toLocaleString('pt-BR')
function getJoinLink() { return `${location.origin}${location.pathname}#/join/${S.roomId}` }

let toastTimer
function toast(msg, type='info') {
  const icons = {info:'💬',success:'✅',error:'❌',warn:'⚠️'}
  const t = $('toast')
  t.textContent = (icons[type]||'💬') + ' ' + msg
  t.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000)
}

function renderRankItems(players, max=999, offset=0) {
  const medals = {1:'🥇',2:'🥈',3:'🥉'}
  const uid = S.user?.uid
  return players.slice(0,max).map((p,i) => {
    const rank = i+1+offset
    const cls = rank===1?'r1':rank===2?'r2':rank===3?'r3':''
    const isMe = p.id===uid
    return `<div class="rank-item ${cls}${isMe?' me':''}" style="animation-delay:${Math.min(i*40,300)}ms">
      <div class="rank-num">${medals[rank]||rank}</div>
      <div style="font-size:26px;line-height:1">${esc(p.avatar||'🦊')}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">
          ${esc(p.nome)}${isMe?' <span class="badge badge-purple" style="font-size:10px">você</span>':''}
        </div>
      </div>
      <div class="rank-score">${fmt(p.score)}</div>
    </div>`
  }).join('')
}

function playSound(type) {
  if (localStorage.getItem('ql_sound')==='false') return
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)()
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.connect(gain); gain.connect(ctx.destination)
    if (type==='correct') {
      osc.frequency.setValueAtTime(523,ctx.currentTime)
      osc.frequency.setValueAtTime(659,ctx.currentTime+.1)
      osc.frequency.setValueAtTime(784,ctx.currentTime+.2)
      gain.gain.setValueAtTime(.3,ctx.currentTime)
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+.4)
      osc.start(); osc.stop(ctx.currentTime+.4)
    } else {
      osc.frequency.setValueAtTime(300,ctx.currentTime)
      osc.frequency.setValueAtTime(250,ctx.currentTime+.1)
      gain.gain.setValueAtTime(.3,ctx.currentTime)
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+.3)
      osc.start(); osc.stop(ctx.currentTime+.3)
    }
  } catch(e) {}
}

        <div style="display:flex;gap:8px">

        </div>

        <div><label class="lbl">Imagem (URL opcional)</label>

          <div style="display:flex;flex-direction:column;gap:8px" id="qf-opts">

              <div class="correct-dot" id="cdot-${i}" onclick="window._setCorrect(${i})"
                style="border-color:${OPT_COLORS[i]};background:${q.correta===i?OPT_COLORS[i]:'transparent'};color:${q.correta===i?'#fff':OPT_COLORS[i]}">
                ${LABELS[i]}
              </div>

            </div>`).join('')}
          </div>
          ${q.type!=='truefalse'&&q.opcoes.length<6?`<button class="btn btn-ghost" style="margin-top:6px;font-size:13px;padding:4px 0" onclick="window._addOpt()">+ Adicionar opção</button>`:''}

  let _qformType = null, _qformCorrect = null, _qformOpts = null

  function getFormQ() {
    const editing = addingIdx >= 0 && addingIdx < questions.length
    const base = editing ? questions[addingIdx] : {type:'multiple',opcoes:['','','',''],correta:0,pontuacao:100,tempo:30}
    const type = _qformType ?? base.type
    const correta = _qformCorrect ?? base.correta
    const opts = _qformOpts ?? [...base.opcoes]
    const pergunta = $('qf-text')?.value.trim() || ''
    const imagem = $('qf-img')?.value.trim() || ''

  window._setCorrect = (i) => {
    _qformCorrect = i

  }
  window._addOpt = () => {
    const q = getFormQ()
    if (q.opcoes.length >= 6) return
    _qformOpts = [...q.opcoes, '']
    rebuildForm()
  }
  window._removeOpt = (i) => {
    const q = getFormQ()
    if (q.opcoes.length <= 2) return
    const opts = q.opcoes.filter((_,j)=>j!==i)
    _qformCorrect = q.correta >= opts.length ? 0 : q.correta === i ? 0 : q.correta > i ? q.correta-1 : q.correta
    _qformOpts = opts
    rebuildForm()
  }

  function rebuildForm() {
    const q = getFormQ()
    // patch state
    const tmpQ = q
    // save text
    const list = document.getElementById('q-list')
    // just re-render form section
    const formContainer = document.querySelector('#ac-addq') || document.querySelector('.card[style*="var(--accent)"]')
    if (formContainer) {

      const savedText = $('qf-text')?.value
      const savedImg = $('qf-img')?.value

    }
  }

  function bindCreate() {
    $('ac-back').onclick = () => navigate('/')

    $('ac-auto').onchange = e => {
      autoMode = e.target.checked

    }
    $('ac-interval')?.addEventListener('change', e => autoInterval = parseInt(e.target.value))

    $('ac-export')?.addEventListener('click', () => {
      const data = {nome:roomName,perguntas:questions}
      const a = document.createElement('a')
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}))
      a.download = `quizlive-${roomName||'quiz'}.json`
      a.click()
      toast('Quiz exportado!','success')
    })
    $('ac-import-btn')?.addEventListener('click',()=>$('ac-import-file').click())
    $('ac-import-file')?.addEventListener('change',e=>{
      const f = e.target.files[0]; if(!f) return
      const r = new FileReader()
      r.onload = ev => {
        try {
          const d = JSON.parse(ev.target.result)
          if (d.nome) roomName = d.nome
          if (Array.isArray(d.perguntas)) { questions = d.perguntas; toast(`${questions.length} perguntas importadas!`,'success') }
          buildPage()
        } catch { toast('Arquivo inválido','error') }
      }
      r.readAsText(f); e.target.value=''
    })

    $('ac-addq')?.addEventListener('click', () => { addingIdx=-1; _qformType=null;_qformCorrect=null;_qformOpts=null; buildPage() })

    window._edit = (i) => { addingIdx=i; _qformType=null;_qformCorrect=null;_qformOpts=null; buildPage() }
    window._del  = (i) => { questions.splice(i,1); buildPage() }
    window._mv   = (i,d) => {
      const j=i+d; if(j<0||j>=questions.length) return
      ;[questions[i],questions[j]]=[questions[j],questions[i]]; buildPage()
    }

    $('qf-save')?.addEventListener('click', () => {
      const q = getFormQ()
      if (!q.pergunta) return toast('Digite o enunciado','warn')
      if (q.opcoes.filter(o=>o.trim()).length < 2) return toast('Adicione ao menos 2 opções','warn')
      if (!q.opcoes[q.correta]?.trim()) return toast('Marque a opção correta','warn')
      const clean = {...q, opcoes: q.opcoes.map(o=>o.trim())}
      if (addingIdx >= 0) questions[addingIdx] = clean
      else questions.push(clean)
      addingIdx=null; _qformType=null;_qformCorrect=null;_qformOpts=null
      toast(addingIdx>=0?'Pergunta atualizada!':'Pergunta adicionada!','success')
      buildPage()
    })
    $('qf-cancel')?.addEventListener('click', () => { addingIdx=null; buildPage() })

    $('ac-create')?.addEventListener('click', createRoom)
  }

  async function createRoom() {
    if (!roomName.trim()) return toast('Digite o nome da sala','warn')
    if (!questions.length) return toast('Adicione ao menos uma pergunta','warn')
    const btn = $('ac-create')
    btn.disabled=true; btn.innerHTML='<div class="spinner spinner-sm" style="margin:0 auto"></div> Criando…'
    try {
      const ref = await addDoc(collection(db,'rooms'),{
        nome:roomName, status:'waiting', currentQuestion:0,
        adminUid:S.user?.uid||'', criadoEm:serverTimestamp(),
        totalQuestions:questions.length, autoMode, autoInterval,
      })
      S.roomId = ref.id
      const hist = JSON.parse(localStorage.getItem('ql_history')||'[]')
      hist.unshift({roomId:ref.id,nome:roomName,criadoEm:Date.now(),totalQuestions:questions.length})
      localStorage.setItem('ql_history',JSON.stringify(hist.slice(0,20)))
      for (let i=0;i<questions.length;i++) {
        await addDoc(collection(db,'questions'),{...questions[i],roomId:ref.id,ordem:i})
      }
      navigate('/room/'+ref.id+'/control')
    } catch(e) {
      toast('Erro: '+e.message,'error')
      btn.disabled=false; btn.innerHTML='🚀 Criar sala e gerar QR Code'
    }
  }

  buildPage()
}

        <div id="ctrl-timer-num" style="font-family:'Clash Display',sans-serif;font-weight:800;font-size:32px;min-width:52px;color:${timerWarn?'var(--red)':'var(--accent)'}">${localTimer}s</div>
        <div style="flex:1">
          <div class="timer-wrap"><div class="timer-fill${timerWarn?' warn':''}" id="ctrl-tbar" style="width:${timerPct}%"></div></div>
        </div>
        <span style="font-size:13px;color:var(--muted)">${cq+1}/${questions.length}</span>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span class="badge badge-purple">${curQ.pontuacao} pts</span>
          <span style="font-size:12px;color:var(--muted)">${curQ.type==='truefalse'?'V/F':'Múltipla escolha'}</span>
        </div>
        ${curQ.imagem?`<img src="${esc(curQ.imagem)}" style="width:100%;height:120px;object-fit:cover;border-radius:10px;margin-bottom:10px" onerror="this.style.display='none'"/>` :''}
        <div style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:18px;line-height:1.35;margin-bottom:14px">${esc(curQ.pergunta)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${(curQ.opcoes||[]).map((o,i)=>{
            const cnt = optStats[i]||0
            const sp = answeredForQ.length ? Math.round(cnt/answeredForQ.length*100) : 0
            return `<div class="stat-opt" style="border-color:${i===curQ.correta?'var(--green)':OPT_COLORS[i]};background:${i===curQ.correta?'rgba(0,255,136,.07)':OPT_COLORS[i]+'11'}">
              <div class="stat-bar" style="background:${OPT_COLORS[i]};width:${sp}%"></div>
              <div style="position:relative;display:flex;align-items:center;gap:6px">
                <span style="font-weight:700;font-size:12px;color:${OPT_COLORS[i]}">${LABELS[i]}</span>
                <span style="font-size:13px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(o)}</span>
                <span style="font-size:12px;font-weight:700;color:${i===curQ.correta?'var(--green)':'var(--text2)'}">${cnt}</span>
              </div>
            </div>`
          }).join('')}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm)">
        <span style="font-size:18px">✍️</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:12px;color:var(--muted)">Respostas</span>
            <span style="font-family:'Clash Display',sans-serif;font-weight:700"><span style="color:var(--accent)">${answeredForQ.length}</span> <span style="color:var(--muted)">/ ${players.length}</span></span>
          </div>
          <div class="ans-bar"><div class="ans-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${cq<questions.length-1
          ? `<button class="btn btn-primary" id="ctrl-next" style="padding:14px">Próxima pergunta →</button>`
          : `<button class="btn btn-success" id="ctrl-finish" style="padding:14px">🏁 Encerrar e ver pódio</button>`}
        <button class="btn btn-danger btn-sm" id="ctrl-end">⏹ Encerrar agora</button>
      </div>
      <div class="card">
        <div class="card-title">📊 Ranking ao vivo</div>
        <div style="display:flex;flex-direction:column;gap:8px">${renderRankItems(players,5)}</div>
      </div>`

      $('ctrl-next')?.addEventListener('click',()=>updateDoc(doc(db,'rooms',roomId),{currentQuestion:cq+1}))
      $('ctrl-finish')?.addEventListener('click',()=>updateDoc(doc(db,'rooms',roomId),{status:'finished'}).then(()=>navigate('/room/'+roomId+'/podium')))
      $('ctrl-end')?.addEventListener('click',()=>updateDoc(doc(db,'rooms',roomId),{status:'finished'}))
    }

    /* ── FINISHED ── */
    else {
      body.innerHTML = `
      <div class="card" style="text-align:center;padding:36px">
        <div style="font-size:56px;margin-bottom:12px">🏁</div>
        <h2 style="font-size:22px;font-weight:700">Jogo encerrado!</h2>
        <p style="color:var(--muted);font-size:13px;margin-top:6px">${players.length} participantes · ${questions.length} perguntas</p>
      </div>
      <button class="btn btn-primary" onclick="navigate('/room/${roomId}/podium')">🏆 Ver pódio</button>
      <button class="btn btn-secondary" onclick="navigate('/room/${roomId}/ranking')">📊 Ranking completo</button>
      <button class="btn btn-secondary" onclick="navigate('/admin')">+ Criar nova sala</button>`
    }
  }

  // Timer
  function startTimer(q) {
    clearInterval(S.timerInterval)
    localTimer = q.tempo||30
    S.timerInterval = setInterval(()=>{
      localTimer = Math.max(0, localTimer-1)
      const num = $('ctrl-timer-num')
      const bar = $('ctrl-tbar')
      if (num) { num.textContent=localTimer+'s'; num.style.color=localTimer<=10?'var(--red)':'var(--accent)' }
      if (bar) { bar.style.width=((localTimer/(q.tempo||30))*100)+'%'; if(localTimer<=10)bar.classList.add('warn') }
      if (localTimer===0) clearInterval(S.timerInterval)
    },1000)
  }

  S.unsubs.push(onSnapshot(doc(db,'rooms',roomId), s => {
    const prev = room
    room = {id:s.id,...s.data()}
    if (room.status==='playing') {
      const q = questions[room.currentQuestion]
      if (q && (prev?.currentQuestion!==room.currentQuestion || prev?.status!==room.status)) {
        startTimer(q)
        // Auto mode
        if (room.autoMode) {
          clearTimeout(S.autoTimeout)
          const total = (q.tempo||30)+(room.autoInterval||5)
          S.autoTimeout = setTimeout(()=>{
            if (room.currentQuestion < questions.length-1)
              updateDoc(doc(db,'rooms',roomId),{currentQuestion:room.currentQuestion+1})
            else
              updateDoc(doc(db,'rooms',roomId),{status:'finished'}).then(()=>navigate('/room/'+roomId+'/podium'))
          }, total*1000)
        }
      }
    }
    draw()
  }))
  S.unsubs.push(onSnapshot(query(collection(db,'questions'),where('roomId','==',roomId),orderBy('ordem')),s=>{
    questions=s.docs.map(d=>({id:d.id,...d.data()})); draw()
  }))
  S.unsubs.push(onSnapshot(query(collection(db,'players'),where('roomId','==',roomId)),s=>{
    players=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0)); draw()
  }))
  S.unsubs.push(onSnapshot(query(collection(db,'answers'),where('roomId','==',roomId)),s=>{
    answers=s.docs.map(d=>d.data()); draw()
  }))
}

function renderJoin() {
  const roomId = S.roomId
  let avatar = S.playerAvatar

  function buildPage() {
    $app().innerHTML = `
    <div class="topbar">
      <span class="logo">⚡ QuizLive</span>
      <button class="btn btn-secondary btn-sm" onclick="navigate('/')">← Home</button>
    </div>
    <div class="screen">
      <div style="text-align:center;padding:20px 0 8px">
        <div style="font-size:56px;margin-bottom:10px;animation:bounceIn .6s ease" id="av-preview">${avatar}</div>
        <h2 style="font-size:22px;font-weight:700">Entrar na sala</h2>
        <p style="color:var(--muted);font-size:13px;margin-top:4px">Sala: <code style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:12px">${esc(roomId)}</code></p>
      </div>
      <div class="card">
        <div class="card-title">Como te chamamos?</div>
        <input id="j-name" class="inp" placeholder="Seu nome ou apelido…" value="${esc(S.playerName)}" maxlength="24" autocomplete="given-name"/>
      </div>
      <div class="card">
        <div class="card-title">Escolha seu avatar</div>
        <div class="avatar-grid">
          ${AVATARS.map(a=>`<div class="av${a===avatar?' sel':''}" data-av="${a}">${a}</div>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" id="j-enter" style="padding:15px;font-size:16px">🎮 Entrar na sala</button>
    </div>`

    document.querySelectorAll('.av').forEach(el => {
      el.onclick = () => {
        avatar = el.dataset.av
        document.querySelectorAll('.av').forEach(e => e.classList.toggle('sel', e.dataset.av===avatar))
        const prev = $('av-preview'); if(prev) prev.textContent=avatar
      }
    })
    $('j-enter').onclick = enterRoom
    $('j-name').addEventListener('keydown', e => { if(e.key==='Enter') enterRoom() })
    setTimeout(()=>$('j-name')?.focus(),100)
  }

  async function enterRoom() {
    const name = $('j-name')?.value.trim()
    if (!name) return toast('Digite seu nome 👆','warn')
    if (!S.user) return toast('Aguarde o login…','warn')
    const btn = $('j-enter')
    btn.disabled=true; btn.innerHTML='<div class="spinner spinner-sm" style="margin:0 auto"></div> Entrando…'
    try {
      const snap = await getDoc(doc(db,'rooms',roomId))
      if (!snap.exists()) { toast('Sala não encontrada ❌','error'); btn.disabled=false; btn.textContent='🎮 Entrar'; return }
      const rd = snap.data()
      if (rd.status==='finished') { toast('Esta sala já encerrou','error'); btn.disabled=false; return }
      S.playerName=name; S.playerAvatar=avatar
      localStorage.setItem('ql_name',name); localStorage.setItem('ql_avatar',avatar)
      await setDoc(doc(db,'players',S.user.uid),{nome:name,avatar,score:0,roomId,entradoEm:serverTimestamp()})
      navigate(rd.status==='playing'?'/play/'+roomId:'/wait/'+roomId)
    } catch(e) {
      toast('Erro: '+e.message,'error')
      btn.disabled=false; btn.textContent='🎮 Entrar na sala'
    }
  }

  buildPage()
}

/* ════════════════════════════════════════════
   PLAYER GAME
════════════════════════════════════════════ */
function renderPlay() {
  const roomId = S.roomId
  const playerId = S.user?.uid
  let room=null, questions=[], answered={}, myScore=0
  let localTimer=30, showFeedback=false

  $app().innerHTML = `<div class="screen" id="play-body" style="min-height:100vh"></div>`

  function draw() {
    const body = $('play-body'); if(!body) return

    if (!room || !questions.length) {
      body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:80vh"><div class="spinner"></div></div>`; return
    }

    if (room.status==='finished') {
      body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:80vh;gap:16px">
        <div style="font-size:72px;animation:bounceIn .6s ease">🏁</div>
        <h2 style="font-size:28px;font-weight:700">Fim de jogo!</h2>
        <p style="color:var(--muted)">Veja como você se saiu</p>
        <div class="score-box" style="width:220px;margin:8px 0">
          <div class="card-title">Sua pontuação</div>
          <div class="score-num">${fmt(myScore)}</div>
        </div>
        <button class="btn btn-primary" style="width:220px;padding:14px" onclick="navigate('/room/${roomId}/podium')">🏆 Ver pódio</button>
        <button class="btn btn-secondary" style="width:220px" onclick="navigate('/')">🏠 Início</button>
      </div>`; return
    }

    const cq = room.currentQuestion||0
    const q = questions[cq]
    if (!q) {
      body.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;text-align:center"><div style="font-size:48px;animation:pulse 2s infinite">⏳</div><p style="color:var(--muted);margin-top:12px">Aguardando próxima pergunta…</p></div>`; return
    }

    const myAns = answered[q.id]
    const hasAns = myAns !== undefined
    const isOk = hasAns && myAns === q.correta
    const timerPct = (localTimer/(q.tempo||30))*100
    const timerWarn = localTimer<=10

    body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="color:var(--muted);font-size:13px">${cq+1} / ${questions.length}</span>
      <div style="font-family:'Clash Display',sans-serif;font-weight:800;font-size:26px;color:${timerWarn?'var(--red)':'var(--accent)'};transition:color .3s" id="p-timer">${localTimer}s</div>
      <div style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:14px;color:var(--accent)">${fmt(myScore)} pts</div>
    </div>
    <div class="dot-row">${questions.map((_,i)=>`<div class="dot ${i<cq?'done':i===cq?'cur':''}"></div>`).join('')}</div>
    <div class="timer-wrap"><div class="timer-fill${timerWarn?' warn':''}" style="width:${timerPct}%" id="p-tbar"></div></div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span class="badge badge-purple">${q.pontuacao} pts base</span>
        <span style="font-size:11px;color:var(--muted)">${q.type==='truefalse'?'✔ V/F':'🔢 Múltipla'}</span>
      </div>
      ${q.imagem?`<img src="${esc(q.imagem)}" style="width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:10px" onerror="this.style.display='none'"/>` :''}
      <div style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:20px;line-height:1.3">${esc(q.pergunta)}</div>
    </div>

    ${hasAns&&showFeedback?`
    <div class="feedback ${isOk?'ok':'ko'}">
      <div style="font-size:36px;animation:bounceIn .4s ease">${isOk?'✅':'❌'}</div>
      <div style="font-weight:700;font-size:15px;color:${isOk?'var(--green)':'var(--red)'};margin-top:4px">${isOk?'Acertou!':'Errou…'}</div>
      ${isOk
        ? `<div style="font-family:'Clash Display',sans-serif;font-weight:800;font-size:22px;color:var(--green);margin-top:4px">+${fmt(q.pontuacao)}</div>`
        : `<div style="font-size:13px;color:var(--muted);margin-top:4px">Correta: <b style="color:var(--green)">${LABELS[q.correta]}</b> — ${esc(q.opcoes[q.correta])}</div>`}
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${q.opcoes.filter(Boolean).map((opt,i)=>{
        let extra=''
        if (hasAns) { if(i===q.correta) extra='correct'; else if(i===myAns) extra='wrong' }
        return `<button class="opt-btn ${OPT_CLS[i]} ${extra}" ${hasAns||localTimer===0?'disabled':''} data-idx="${i}" onclick="window._ans(${i})">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="opt-label" style="background:${OPT_COLORS[i]}22;color:${OPT_COLORS[i]}">${LABELS[i]}</span>
            <span style="font-size:13px;line-height:1.35">${esc(opt)}</span>
          </div>
        </button>`
      }).join('')}
    </div>

    <div class="score-box">
      <div class="card-title">Pontuação total</div>
      <div class="score-num">${fmt(myScore)}</div>
    </div>`

    window._ans = async (idx) => {
      const q2 = questions[room?.currentQuestion]
      if (!q2 || answered[q2.id]!==undefined || !playerId) return
      const isCorrect = idx===q2.correta
      const maxTime = q2.tempo||30
      const timeBonus = Math.max(0, Math.round((localTimer/maxTime)*q2.pontuacao*.5))
      const pts = isCorrect ? q2.pontuacao+timeBonus : 0
      answered[q2.id]=idx; showFeedback=true
      playSound(isCorrect?'correct':'wrong')
      draw()
      const ansId=`${playerId}_${q2.id}`
      try {
        const ex = await getDoc(doc(db,'answers',ansId))
        if (!ex.exists()) {
          await setDoc(doc(db,'answers',ansId),{playerId,questionId:q2.id,roomId,resposta:idx,correta:isCorrect,pontosGanhos:pts,ts:serverTimestamp()})
          if (pts>0) await updateDoc(doc(db,'players',playerId),{score:increment(pts)})
        }
      } catch(e){console.error(e)}
    }
  }

  // Ticker for timer display
  function tickTimer(q) {
    clearInterval(S.timerInterval)
    localTimer = q.tempo||30
    S.timerInterval = setInterval(()=>{
      localTimer = Math.max(0, localTimer-1)
      const num=$('p-timer'); const bar=$('p-tbar')
      if (num) { num.textContent=localTimer+'s'; num.style.color=localTimer<=10?'var(--red)':'var(--accent)' }
      if (bar) { bar.style.width=((localTimer/(q.tempo||30))*100)+'%'; if(localTimer<=10) bar.classList.add('warn') }
      if (localTimer===0) clearInterval(S.timerInterval)
    },1000)
  }

  S.unsubs.push(onSnapshot(doc(db,'rooms',roomId), s=>{
    const prev=room
    room={id:s.id,...s.data()}
    if (room.status==='playing') {
      const q=questions[room.currentQuestion]
      if (q && (prev?.currentQuestion!==room.currentQuestion || prev?.status!==room.status)) {
        showFeedback=false; tickTimer(q)
      }
    }
    draw()
  }))
  S.unsubs.push(onSnapshot(query(collection(db,'questions'),where('roomId','==',roomId),orderBy('ordem')),s=>{
    questions=s.docs.map(d=>({id:d.id,...d.data()})); draw()
  }))
  S.unsubs.push(onSnapshot(query(collection(db,'answers'),where('playerId','==',playerId),where('roomId','==',roomId)),s=>{
    myScore=0; const a={}
    s.docs.forEach(d=>{const da=d.data();a[da.questionId]=da.resposta;myScore+=(da.pontosGanhos||0)})
    answered=a; draw()
  }))
}

    <div class="podium">
      <div class="pod-col">
        ${p2?`<div class="pod-emoji" style="animation-delay:.3s">${esc(p2.avatar||'🦊')}</div>
        <div style="font-size:12px;font-weight:600;text-align:center;max-width:80px;line-height:1.3">${esc(p2.nome)}</div>
        <div style="font-size:11px;color:var(--muted)">${fmt(p2.score)}</div>
        <div class="pod-block pod-p2">2</div>`:
        '<div class="pod-block pod-p2"></div>'}
      </div>
      <div class="pod-col">
        ${p1?`<div class="pod-emoji big" style="animation-delay:.1s">${esc(p1.avatar||'🦊')}</div>
        <div style="font-size:13px;font-weight:700;text-align:center;max-width:90px;line-height:1.3">${esc(p1.nome)}</div>
        <div style="font-size:11px;color:var(--muted)">${fmt(p1.score)}</div>
        <div class="pod-block pod-p1">1</div>`:
        '<div class="pod-block pod-p1"></div>'}
      </div>
      <div class="pod-col">
        ${p3?`<div class="pod-emoji" style="animation-delay:.4s">${esc(p3.avatar||'🦊')}</div>
        <div style="font-size:12px;font-weight:600;text-align:center;max-width:80px;line-height:1.3">${esc(p3.nome)}</div>
        <div style="font-size:11px;color:var(--muted)">${fmt(p3.score)}</div>
        <div class="pod-block pod-p3">3</div>`:
        '<div class="pod-block pod-p3"></div>'}
      </div>
    </div>
    ${me&&myRank>0?`
    <div class="card" style="text-align:center;border-color:var(--accent);background:rgba(104,67,255,.06)">
      <div class="card-title">Seu resultado</div>
      <div style="font-family:'Clash Display',sans-serif;font-weight:800;font-size:40px;color:var(--accent)">#${myRank}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${fmt(me.score)} pontos</div>
    </div>`:''}
    ${rest.length?`
    <div class="card">
      <div class="card-title">Outros participantes</div>
      <div style="display:flex;flex-direction:column;gap:8px">${renderRankItems(rest,99,3)}</div>
    </div>`:''}
    <button class="btn btn-secondary" onclick="navigate('/room/${roomId}/ranking')">📊 Ranking completo</button>
    <button class="btn btn-secondary" onclick="navigate('/')">🏠 Início</button>`
  }))
}

/* ════════════════════════════════════════════
   HISTORY
════════════════════════════════════════════ */
function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('ql_history')||'[]')
  $app().innerHTML=`
  <div class="topbar">
    <span class="logo">⚡ QuizLive</span>
    <button class="btn btn-secondary btn-sm" onclick="navigate('/')">← Home</button>
  </div>
  <div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2 style="font-size:22px;font-weight:700">📚 Histórico</h2>
      ${hist.length?`<button class="btn btn-danger btn-xs" onclick="localStorage.removeItem('ql_history');navigate('/history')">Limpar</button>`:''}
    </div>
    ${hist.length===0?`
    <div class="card" style="text-align:center;padding:48px 20px">
      <div style="font-size:48px;margin-bottom:12px">📭</div>
      <p style="color:var(--muted)">Nenhum quiz criado ainda</p>
      <button class="btn btn-primary" style="width:auto;padding:10px 24px;margin-top:16px" onclick="navigate('/admin')">+ Criar quiz</button>
    </div>`
    :hist.map(item=>`
    <div class="card" style="cursor:pointer;transition:border-color .2s" onclick="navigate('/room/${item.roomId}/control')" onmouseenter="this.style.borderColor='rgba(104,67,255,.4)'" onmouseleave="this.style.borderColor=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div style="font-weight:600;font-size:15px">${esc(item.nome)}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:3px">${item.totalQuestions} perguntas · ${new Date(item.criadoEm).toLocaleDateString('pt-BR')}</div>
        </div>
        <span style="color:var(--muted);font-size:20px">→</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();navigate('/room/${item.roomId}/podium')">🏆 Pódio</button>
        <button class="btn btn-secondary btn-xs" onclick="event.stopPropagation();navigator.clipboard.writeText('${location.origin}${location.pathname}#/join/${item.roomId}');window._t('Link copiado!','success')">📋 Link</button>
      </div>
    </div>`).join('')}
  </div>`
  window._t = toast
}

/* ── Bootstrap ────────────────────────────────────────────────────── */
ensureAuth().then(handleRoute)
</script>
</body>
</html>
